[alias]
b = "build"
c = "check"
t = "test"
r = "run"
w = "watch -x check"
wr = "watch -x run"
rl = "run --example lab"

[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-musl-gcc"

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[expand]
theme = "Solarized (light)"
